name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Build web component ──────────────────────────────────────────────
      - name: Install web component dependencies
        run: npm ci

      - name: Build web component
        run: npm run build

      # ── Build landing page ───────────────────────────────────────────────
      - name: Install landing dependencies
        run: npm ci
        working-directory: landing

      - name: Build landing page
        run: npm run build
        working-directory: landing

      # ── Merge outputs into a single deploy folder ────────────────────────
      - name: Combine outputs
        run: |
          mkdir -p _site
          # Landing page goes to root (index.html + assets)
          cp -r landing/dist/. _site/
          # Web component scripts go alongside at root
          cp dist/handsfree-cooking.js _site/
          cp dist/handsfree-cooking.iife.js _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
